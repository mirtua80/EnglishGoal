// ── HELPERS ───────────────────────────────────────────────────────────────
function calcPoints(pred, real, joker=false) {
  if (!pred||!real) return {pts:0,bonus:0,scorer:0,total:0,error:null};
  const ph=parseInt(pred.home),pa=parseInt(pred.away),rh=parseInt(real.home),ra=parseInt(real.away);
  if ([ph,pa,rh,ra].some(isNaN)) return {pts:0,bonus:0,scorer:0,total:0,error:null};
  const error=Math.abs(ph-rh)+Math.abs(pa-ra);
  let pts=error===0?10:error===1?6:error===2?3:error===3?1:0;
  const bonus=(ph>pa?"H":ph<pa?"A":"D")===(rh>ra?"H":rh<ra?"A":"D")?2:0;
  const scorer=(pred.scorer&&real.scorer&&pred.scorer===real.scorer)?3:0;
  if(joker) pts=pts*2;
  return {pts,bonus,scorer,total:pts+bonus+scorer,error};
}
function mkBadge(r) {
  if(r.error===null) return null;
  if(r.error===0) return {label:`🎯 ${r.total}pts`,color:"#16a34a"};
  if(r.total>0) return {label:`${r.pts}+${r.bonus+r.scorer}pts`,color:r.pts>=6?"#d97706":"#64748b"};
  return {label:"❌ 0",color:"#475569"};
}
function btnS(bg,border,color){return {background:bg,border:`1px solid ${border}`,borderRadius:8,color,fontSize:12,cursor:"pointer",padding:"7px"};}
function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}

// ── FIREBASE ──────────────────────────────────────────────────────────────
function useFB(path, def) {
  const [data,setData]=useState(def);
  useEffect(()=>{
    if(!window._fb||!path) return;
    const {db,ref,onValue}=window._fb;
    const unsub=onValue(ref(db,path),snap=>{ const v=snap.val(); setData(v!==null?v:def); });
    return ()=>unsub();
  },[path]);
  const save=async(d)=>{ const {db,ref,set}=window._fb; await set(ref(db,path),d); };
  return [data,save];
}

function App() {
  // Session stored in localStorage
  const [session,setSession] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem("mundial26_session")||"null"); }catch(e){return null;}
  });
  // session = { groupCode, groupName, userName, isAdmin }

  const [toast,setToast] = useState(null);
  const toast_=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};

  const saveSession=(s)=>{
    localStorage.setItem("mundial26_session",JSON.stringify(s));
    setSession(s);
  };

  if(!session) return <LobbyScreen onJoin={saveSession} toast_={toast_}/>;

  if(session.isAdmin) return (
    <AdminApp session={session} onExit={()=>saveSession(null)} toast_={toast_} toast={toast}/>
  );

  return (
    <GroupApp session={session} onExit={()=>saveSession(null)} toast_={toast_} toast={toast}/>
  );
}

function LobbyScreen({onJoin, toast_}) {

  const [newUser,setNewUser] = useState("");
  const [code,setCode]       = useState("");

  // After entering code: show group info + existing members
  const [foundGroup,setFoundGroup] = useState(null); // {code, name, members:[]}
  const [manualName,setManualName] = useState("");

  const handleJoin = (session) => {
    // Save to localStorage for quick re-entry
    try {
      const saved = JSON.parse(localStorage.getItem("mundial26_groups")||"[]");
      const filtered = saved.filter(g=>!(g.groupCode===session.groupCode&&g.userName===session.userName));
      const updated = [{groupCode:session.groupCode,groupName:session.groupName,userName:session.userName},...filtered].slice(0,10);
      localStorage.setItem("mundial26_groups",JSON.stringify(updated));
    } catch(e){}
    onJoin(session);
  };

  const createGroup = async () => {
    if(!gname.trim()||!newUser.trim()) return;
    setLoading(true);
    const {db,ref,set,get}=window._fb;
    let nc;
    do { nc=genCode(); } while((await get(ref(db,`groups/${nc}`))).exists());
    await set(ref(db,`groups/${nc}`),{name:gname.trim(),created:new Date().toISOString()});
    await set(ref(db,`groups/${nc}/players/${newUser.trim()}`),{joined:new Date().toISOString()});
    handleJoin({groupCode:nc,groupName:gname.trim(),userName:newUser.trim(),isAdmin:false});
    setLoading(false);
  };

  // Step 1: look up group by code
  const lookupGroup = async () => {
    if(!code.trim()) return;
    setLoading(true);
    const {db,ref,get}=window._fb;
    const snap=await get(ref(db,`groups/${code.toUpperCase()}`));
    if(!snap.exists()){toast_("Código no encontrado ❌","err");setLoading(false);return;}
    const grp=snap.val();
    const members=Object.keys(grp.players||{});
    setFoundGroup({code:code.toUpperCase(),name:grp.name,members});
    setLoading(false);
  };

  // Step 2a: select existing member
  const selectMember = async (name) => {
    handleJoin({groupCode:foundGroup.code,groupName:foundGroup.name,userName:name,isAdmin:false});
  };

    if(!manualName.trim()) return;

        {tab===0&&<HomeTab leaderboard={leaderboard} user={userName} results={results} preds={preds} champion={champion} realChamp={realChamp} jokers={jokers} groupCode={groupCode} groupName={groupName} onGoRules={()=>setTab(5)}/>}
        {tab===1&&<MatchesTab user={userName} preds={preds} results={results} jokers={jokers}
          onSave={(id,h,a,sc)=>{savePreds({...preds,[userName]:{...(preds[userName]||{}),[id]:{home:h,away:a,scorer:sc}}});toast_("Predicción guardada ✅");}}
          onDeletePred={(id)=>{const np={...preds,[userName]:{...(preds[userName]||{})}};delete np[userName][id];savePreds(np);toast_("Eliminada 🗑️");}}
          onUseJoker={(id)=>{saveJokers({...jokers,[userName]:{matchId:id}});toast_("🃏 Comodín x2 activado!");}}
          onRemoveJoker={()=>{const nj={...jokers};delete nj[userName];saveJokers(nj);toast_("Comodín retirado");}}/>}
        {tab===2&&<ChampionTab user={userName} champion={champion} realChamp={realChamp} onSave={(t)=>{saveChampion({...champion,[userName]:t});toast_(`Apuesta: ${t} 🏆`);}}/>}

        {tab===4&&<ChartTab players={Object.keys(players)} chartData={chartData}/>}
        {tab===5&&<RulesTab/>}
      </main>
    </div>
  );
}

// ── MATCHES TAB ───────────────────────────────────────────────────────────
function MatchesTab({user,preds,results,jokers,onSave,onDeletePred,onUseJoker,onRemoveJoker}) {
  const [inp,setInp]=useState({}); const [sc,setSc]=useState({}); const [gf,setGF]=useState("ALL");
  const setV=(id,side,val)=>setInp(p=>({...p,[id]:{...(p[id]||{}),[side]:val}}));
  const myJoker=jokers[user];
  const filtered=gf==="ALL"?MATCHES:MATCHES.filter(m=>m.group===gf);
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:"bold",fontSize:14}}>⚽ Partidos</div>
        <div style={{fontSize:11,background:myJoker?"#2e1065":"rgba(245,158,11,0.15)",border:`1px solid ${myJoker?"#7c3aed":"#f59e0b44"}`,borderRadius:20,padding:"3px 9px",color:myJoker?"#d8b4fe":"#fbbf24"}}>
          🃏 {myJoker?`Usado #${myJoker.matchId}`:"Disponible"}
        </div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
        {["ALL","A","B","C","D","E","F","G","H","I","J","K","L"].map(g=>(
          <button key={g} onClick={()=>setGF(g)} style={{padding:"3px 8px",borderRadius:20,cursor:"pointer",border:"none",background:gf===g?"#f59e0b":"#1e293b",color:gf===g?"#0f172a":"#94a3b8",fontSize:11,fontWeight:gf===g?"bold":"normal"}}>
            {g==="ALL"?"Todos":`Gr.${g}`}
          </button>
        ))}
      </div>
      {filtered.map(m=>{
        const pred=preds[user]?.[m.id],real=results[m.id];
        const hasJoker=myJoker?.matchId===m.id;
        const r=calcPoints(pred,real,hasJoker),b=mkBadge(r),done=!!real;
        const hv=inp[m.id]?.home??pred?.home??"",av=inp[m.id]?.away??pred?.away??"";
        const sv=sc[m.id]??pred?.scorer??"";
        return (
          <div key={m.id} style={{background:"#1e293b",borderRadius:12,padding:11,marginBottom:7,border:`1px solid ${hasJoker?"#7c3aed":"#334155"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:7}}>
              <span style={{background:"#f59e0b",color:"#0f172a",fontSize:10,fontWeight:"bold",padding:"2px 6px",borderRadius:5}}>Gr.{m.group}</span>
              <span style={{fontSize:10,color:"#64748b"}}>{m.date}</span>
              {hasJoker&&<span style={{background:"#7c3aed",color:"#fff",fontSize:10,padding:"2px 5px",borderRadius:5}}>🃏 x2</span>}
              {b&&<span style={{marginLeft:"auto",fontSize:10,padding:"2px 7px",borderRadius:6,fontWeight:"bold",color:"#fff",background:b.color}}>{b.label}</span>}
            </div>
            {/* Scores row */}
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{flex:1,fontSize:12,fontWeight:500}}>{m.home}</span>
              {done
                ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{background:"#0f172a",borderRadius:8,padding:"4px 14px",fontSize:17,fontWeight:"bold",color:"#22c55e"}}>{real.home}–{real.away}</div>
                    {pred
                      ? <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:9,color:"#64748b"}}>Tu pred:</span>
                          <span style={{fontSize:13,fontWeight:"bold",color:r.error===0?"#22c55e":r.pts>0?"#f59e0b":"#ef4444",background:"#0f172a",borderRadius:6,padding:"2px 8px"}}>{pred.home}–{pred.away}</span>
                        </div>
                      : <div style={{fontSize:9,color:"#475569",fontStyle:"italic"}}>Sin predicción</div>
                    }
                  </div>
                : <div style={{display:"flex",alignItems:"center",gap:3}}>
                    <input style={S.scoreBox} type="number" min="0" max="20" value={hv} onChange={e=>setV(m.id,"home",e.target.value)}/>
                    <span style={{color:"#f59e0b",fontWeight:"bold"}}>:</span>
                    <input style={S.scoreBox} type="number" min="0" max="20" value={av} onChange={e=>setV(m.id,"away",e.target.value)}/>
                  </div>
              }
              <span style={{flex:1,fontSize:12,fontWeight:500,textAlign:"right"}}>{m.away}</span>
            </div>
            {!done&&<div style={{marginTop:7}}>
              <select style={{...S.inp,marginBottom:0,padding:"5px 8px",fontSize:11}} value={sv} onChange={e=>setSc(p=>({...p,[m.id]:e.target.value}))}>
                <option value="">— Primer goleador (+3pts) —</option>
                {PLAYERS.filter(p=>p.country===m.home||p.country===m.away).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>(
                  <option key={p.name} value={p.name}>{p.flag} {p.name} ({p.pos})</option>
                ))}
              </select>
            </div>}
            {done&&pred&&<div style={{marginTop:6,background:"#0f172a",borderRadius:8,padding:"7px 10px",fontSize:11}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{color:"#64748b"}}>Error:</span>
                <span style={{color:"#f1f5f9",fontWeight:"bold"}}>{r.error} gol{r.error!==1?"es":""}</span>
                <span style={{color:"#64748b",marginLeft:4}}>Base:</span>
                <span style={{color:"#f59e0b",fontWeight:"bold"}}>{r.pts}{hasJoker?" (x2)":""}</span>
                <span style={{color:"#64748b",marginLeft:4}}>Bonus:</span>
                <span style={{color:"#7c3aed",fontWeight:"bold"}}>+{r.bonus+r.scorer}</span>
                <span style={{marginLeft:"auto",fontWeight:"bold",color:r.total>=10?"#22c55e":r.total>=6?"#f59e0b":r.total>0?"#94a3b8":"#ef4444",fontSize:13}}>={r.total}pts</span>
              </div>
              {real.scorer&&<div style={{marginTop:5,paddingTop:5,borderTop:"1px solid #1e293b",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:"#64748b"}}>⚽ Goleador real:</span>
                <span style={{fontWeight:"bold",color:"#22c55e",fontSize:11}}>{real.scorer}</span>
                {pred.scorer
                  ? <><span style={{fontSize:10,color:"#64748b",marginLeft:4}}>Tu pred:</span>
                    <span style={{fontWeight:"bold",fontSize:11,color:pred.scorer===real.scorer?"#22c55e":"#ef4444"}}>{pred.scorer}{pred.scorer===real.scorer?" ✓ +3pts":""}</span></>
                  : <span style={{fontSize:10,color:"#475569",fontStyle:"italic"}}>Sin pred. goleador</span>
                }
              </div>}
            </div>}
            {done&&!pred&&<div style={{marginTop:5,background:"#0f172a",borderRadius:7,padding:"6px 10px",fontSize:11,color:"#475569",fontStyle:"italic",textAlign:"center"}}>No hiciste predicción en este partido</div>}
            {!done&&<div style={{marginTop:7,display:"flex",gap:5}}>
              <button style={{flex:1,...btnS("#0f3460","#1d4ed8","#93c5fd")}} onClick={()=>onSave(m.id,hv,av,sv)}>Guardar ✓</button>
              {!myJoker&&<button style={{padding:"6px 9px",...btnS("#2e1065","#7c3aed","#d8b4fe")}} onClick={()=>onUseJoker(m.id)}>🃏</button>}
              {hasJoker&&<button style={{padding:"6px 9px",...btnS("#1a0a0a","#7f1d1d","#fca5a5")}} onClick={onRemoveJoker}>✕🃏</button>}
              {pred&&<button style={{padding:"6px 9px",...btnS("#1a0a0a","#7f1d1d","#fca5a5")}} onClick={()=>onDeletePred(m.id)}>🗑️</button>}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ── CHART TAB ─────────────────────────────────────────────────────────────
function ChartTab({players,chartData}) {
  const [hover,setHover] = useState(null);

  if(chartData.length===0) return (
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:36,marginBottom:10}}>📊</div>
      <div style={{color:"#64748b"}}>Aparecerá cuando se jueguen los primeros partidos</div>
    </div>
  );

  // Calculate max value for scaling
  const maxVal = Math.max(...chartData.flatMap(d=>players.map(p=>d[p]||0)), 1);
  const W = 320, H = 200, PAD = {top:10,right:10,bottom:24,left:30};
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;
  const xStep = chartData.length > 1 ? cW / (chartData.length - 1) : cW;

  const xPos = (i) => PAD.left + (chartData.length > 1 ? i * xStep : cW/2);
  const yPos = (v) => PAD.top + cH - (v / maxVal) * cH;

  return (
    <div>
      <div style={{fontWeight:"bold",fontSize:14,marginBottom:4}}>📊 Evolución del ranking</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:12}}>Puntos acumulados partido a partido</div>

      <div style={{background:"#1e293b",borderRadius:12,padding:"14px 10px",border:"1px solid #334155",overflowX:"auto"}}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
          {/* Grid lines */}
          {[0,25,50,75,100].filter(v=>v<=maxVal+5).map(v=>{
            const y = yPos(v * maxVal / 100);
            return <g key={v}>
              <line x1={PAD.left} y1={y} x2={W-PAD.right} y2={y} stroke="#334155" strokeDasharray="3,3" strokeWidth={0.5}/>
              <text x={PAD.left-4} y={y+3} fontSize={8} fill="#64748b" textAnchor="end">{Math.round(v*maxVal/100)}</text>
            </g>;
          })}
          {/* X axis labels */}
          {chartData.map((d,i)=>(
            <text key={i} x={xPos(i)} y={H-6} fontSize={8} fill="#64748b" textAnchor="middle">{d.name}</text>
          ))}
          {/* Lines per player */}
          {players.map((p,pi)=>{
            const col = COLORS[pi % COLORS.length];
            const points = chartData.map((d,i)=>({x:xPos(i),y:yPos(d[p]||0),v:d[p]||0,match:d.match}));
            const path = points.map((pt,i)=>`${i===0?"M":"L"}${pt.x},${pt.y}`).join(" ");
            return (
              <g key={p}>
                <path d={path} fill="none" stroke={col} strokeWidth={2} strokeLinejoin="round"/>
                {points.map((pt,i)=>(
                  <circle key={i} cx={pt.x} cy={pt.y} r={3} fill={col} stroke="#1e293b" strokeWidth={1}
                    onMouseEnter={()=>setHover({x:pt.x,y:pt.y,name:p,val:pt.v,match:pt.match,col})}
                    onMouseLeave={()=>setHover(null)}/>
                ))}
              </g>
            );
          })}
          {/* Hover tooltip */}
          {hover&&<g>
            <rect x={Math.min(hover.x+6,W-90)} y={Math.max(hover.y-30,0)} width={84} height={28} rx={4} fill="#0f172a" stroke={hover.col} strokeWidth={1}/>
            <text x={Math.min(hover.x+9,W-87)} y={Math.max(hover.y-17,13)} fontSize={9} fill={hover.col} fontWeight="bold">{hover.name}</text>
            <text x={Math.min(hover.x+9,W-87)} y={Math.max(hover.y-7,23)} fontSize={9} fill="#94a3b8">{hover.val} pts</text>
          </g>}
        </svg>
      </div>

      {/* Legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12}}>
        {players.map((p,i)=>{
          const last = chartData[chartData.length-1];
          return (
            <div key={p} style={{display:"flex",alignItems:"center",gap:6,background:"#1e293b",borderRadius:8,padding:"6px 10px",border:`1px solid ${COLORS[i%COLORS.length]}44`}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:COLORS[i%COLORS.length],flexShrink:0}}/>
              <span style={{fontSize:12}}>{p}</span>
              <span style={{fontWeight:"bold",color:COLORS[i%COLORS.length],fontSize:13}}>{last[p]||0}pts</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── ADMIN GROUPS TAB ──────────────────────────────────────────────────────
function AdminGroupsTab({groups}) {
  const [expanded,setExpanded] = useState(null);
  const [confirm,setConfirm]   = useState(null);

  const doAction = async (action, groupCode, userName) => {
    const {db,ref,set,get} = window._fb;
    if(action==="resetPreds"){
      await set(ref(db,`groups/${groupCode}/predictions/${userName}`),{});
    } else if(action==="resetDream"){
      await set(ref(db,`groups/${groupCode}/dreamXI/${userName}`),[]);
    } else if(action==="removeUser"){
      const grpSnap = await get(ref(db,`groups/${groupCode}`));
      if(!grpSnap.exists()) return;
      const grp = grpSnap.val();
      // delete player
      const players = {...(grp.players||{})}; delete players[userName];
      await set(ref(db,`groups/${groupCode}/players`),players);
      // delete predictions
      const preds = {...(grp.predictions||{})}; delete preds[userName];
      await set(ref(db,`groups/${groupCode}/predictions`),preds);
      // delete dreamXI
      const dream = {...(grp.dreamXI||{})}; delete dream[userName];
      await set(ref(db,`groups/${groupCode}/dreamXI`),dream);
      // delete champion
      const champ = {...(grp.champion||{})}; delete champ[userName];
      await set(ref(db,`groups/${groupCode}/champion`),champ);
    } else if(action==="deleteGroup"){
      await set(ref(db,`groups/${groupCode}`),null);
    }
  };

  if(!groups||Object.keys(groups).length===0) return <p style={{textAlign:"center",color:"#64748b",marginTop:40}}>No hay grupos creados aún</p>;

  const Confirm=({msg,onYes,onNo})=>(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#1e293b",borderRadius:14,padding:22,maxWidth:300,width:"100%",textAlign:"center",border:"1px solid #ef4444"}}>
        <div style={{fontSize:26,marginBottom:8}}>⚠️</div>
        <div style={{fontSize:12,color:"#f1f5f9",marginBottom:18}}>{msg}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onNo} style={{flex:1,padding:"8px",borderRadius:8,background:"#334155",border:"none",color:"#f1f5f9",cursor:"pointer",fontSize:12}}>Cancelar</button>
          <button onClick={onYes} style={{flex:1,padding:"8px",borderRadius:8,background:"#dc2626",border:"none",color:"#fff",fontWeight:"bold",cursor:"pointer",fontSize:12}}>Confirmar</button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      {confirm&&<Confirm msg={confirm.msg} onYes={()=>{confirm.action();setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
      <p style={{fontSize:11,color:"#64748b",marginBottom:12}}>Gestiona los grupos y sus participantes.</p>
      {Object.entries(groups).map(([code,grp])=>{
        const members=Object.keys(grp.players||{});
        const isExp=expanded===code;
        return (
          <div key={code} style={{background:"#1e293b",borderRadius:12,marginBottom:8,border:"1px solid #334155",overflow:"hidden"}}>
            {/* Group header */}
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:code)}>
              <div style={{flex:1}}>
                <div style={{fontWeight:"bold",fontSize:14}}>{grp.name}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:1}}>
                  Código: <b style={{color:"#f59e0b",letterSpacing:2}}>{code}</b> · {members.length} miembro{members.length!==1?"s":""}
                </div>
              </div>
              <span style={{color:"#475569",fontSize:12}}>{isExp?"▲":"▼"}</span>
            </div>

            {/* Expanded: members */}
            {isExp&&(
              <div style={{borderTop:"1px solid #334155",padding:"10px 14px",background:"#0f1e33"}}>
                {members.length===0&&<p style={{fontSize:11,color:"#64748b"}}>Sin miembros</p>}
                {members.map(name=>(
                  <div key={name} style={{background:"#1e293b",borderRadius:10,padding:"10px 12px",marginBottom:6}}>
                    <div style={{display:"flex",alignItems:"center",marginBottom:7}}>
                      <span style={{flex:1,fontWeight:"bold",fontSize:13}}>{name}</span>
                      <span style={{fontSize:10,color:"#64748b"}}>
                        {Object.keys(grp.predictions?.[name]||{}).length} preds · {(grp.dreamXI?.[name]||[]).length} XI
                      </span>
                    </div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      <button style={{padding:"5px 9px",borderRadius:7,background:"rgba(245,158,11,0.1)",border:"1px solid #f59e0b44",color:"#fbbf24",fontSize:11,cursor:"pointer"}}
                        onClick={()=>setConfirm({msg:`¿Borrar predicciones de ${name} en ${grp.name}?`,action:()=>doAction("resetPreds",code,name)})}>
                        🗑️ Predicciones
                      </button>
                      <button style={{padding:"5px 9px",borderRadius:7,background:"rgba(168,85,247,0.1)",border:"1px solid #a855f744",color:"#d8b4fe",fontSize:11,cursor:"pointer"}}
                        onClick={()=>setConfirm({msg:`¿Borrar Dream XI de ${name} en ${grp.name}?`,action:()=>doAction("resetDream",code,name)})}>
                        🗑️ Dream XI
                      </button>
                      <button style={{padding:"5px 9px",borderRadius:7,background:"#1a0a0a",border:"1px solid #7f1d1d",color:"#fca5a5",fontSize:11,cursor:"pointer"}}
                        onClick={()=>setConfirm({msg:`¿Eliminar a ${name} del grupo ${grp.name}?`,action:()=>doAction("removeUser",code,name)})}>
                        ❌ Eliminar
                      </button>
                    </div>
                  </div>
                ))}
                {/* Delete whole group */}
                <button style={{width:"100%",marginTop:6,padding:"8px",...btnS("#1a0a0a","#7f1d1d","#fca5a5"),fontSize:11}}
                  onClick={()=>setConfirm({msg:`¿Eliminar COMPLETAMENTE el grupo "${grp.name}"? Se borrarán todos los datos.`,action:()=>doAction("deleteGroup",code,null)})}>
                  🗑️ Eliminar grupo completo
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

const S={
  inp:{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid #475569",background:"#0f172a",color:"#f1f5f9",fontSize:15,marginBottom:10,fontFamily:"Georgia,serif",outline:"none"},
  btn:{width:"100%",padding:"11px",borderRadius:10,background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",color:"#0f172a",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif"},
  scoreBox:{width:42,height:34,borderRadius:7,border:"1px solid #475569",background:"#0f172a",color:"#f1f5f9",textAlign:"center",fontSize:16,fontWeight:"bold",fontFamily:"Georgia,serif"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
